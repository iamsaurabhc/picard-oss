services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_ML: ${INSTALL_ML:-false}
    ports:
      - "8000:8000"
    volumes:
      - picard-data:/data
    environment:
      PICARD_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/picard.db
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  paddleocr:
    profiles: [ocr]
    image: python:3.11-slim
    working_dir: /ocr
    volumes:
      - ./backend/ocr/paddleocr:/ocr:ro
    command: >
      bash -c "pip install -q -r requirements.txt && python server.py"
    ports:
      - "8829:8829"
    environment:
      PADDLE_OCR_PORT: "8829"

  backend-ml:
    profiles: [ml]
    extends:
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_ML: "true"

volumes:
  picard-data:
