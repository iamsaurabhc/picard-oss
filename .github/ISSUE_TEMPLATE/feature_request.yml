name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and proposed solution. For retrieval or citation behavior changes, note eval impact if you can.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point or gap does this address?
      placeholder: Legal engineers need to export tabular review results to Excel with citation links preserved.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search / retrieval / CARP
        - Chat / citations
        - Tabular review
        - PDF viewer / verification UX
        - Workflows / agent
        - Desktop / Docker / ops
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Retrieval or eval impact
      description: If this affects search, refuse gates, or citation mapping, describe expected metric impact (R/C/F/CT/FG/AB).

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for similar requests
          required: true
